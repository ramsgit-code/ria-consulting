name: Blog Auto-Publisher

on:
  schedule:
    # Publica 1 articulo cada lunes a las 8:00 AM UTC
    - cron: "0 8 * * 1"
  workflow_dispatch:
    inputs:
      topic:
        description: "Tema del articulo (opcional — si esta vacio usa noticias actuales)"
        required: false
      mode:
        description: "Modo: 'news' (noticias actuales) o 'queue' (cola planificada)"
        required: false
        default: "news"

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      - name: Generate blog post
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          TOPIC="${{ github.event.inputs.topic }}"
          MODE="${{ github.event.inputs.mode || 'news' }}"

          if [ -n "$TOPIC" ]; then
            npx tsx scripts/blog-agent.ts --mode="$MODE" --topic="$TOPIC"
          else
            npx tsx scripts/blog-agent.ts --mode="$MODE"
          fi

      - name: Commit and push
        run: |
          git config user.name "Blog Agent"
          git config user.email "bot@ramiroperez.com"
          git add src/content/blog/
          git diff --staged --quiet || git commit -m "blog: nuevo articulo generado automaticamente"
          git push
